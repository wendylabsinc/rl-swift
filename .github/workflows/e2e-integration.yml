name: E2E Integration Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  e2e-macos:
    name: macOS Integration
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Run Swift package tests
        run: swift test --parallel

  e2e-linux:
    name: Linux Core Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Run core-only tests
        run: |
          swift --version
          swift test --disable-default-traits --parallel

      - name: Run TensorRT-guarded tests (best effort)
        continue-on-error: true
        env:
          CI: true
        run: |
          swift test --disable-default-traits --traits TensorRTBackend --parallel
