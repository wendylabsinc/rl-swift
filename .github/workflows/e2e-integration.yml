name: E2E Integration Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  e2e-macos:
    name: macOS Integration
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.3.2
        run: |
          curl -fsSL https://download.swift.org/swift-6.3.2-release/xcode/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-osx.pkg -o swift-6.3.2-osx.pkg
          sudo installer -pkg swift-6.3.2-osx.pkg -target /
          echo "/Library/Developer/Toolchains/swift-6.3.2-RELEASE.xctoolchain/usr/bin" >> "$GITHUB_PATH"

      - name: Show Swift version
        run: swift --version

      - name: Run Swift package tests
        run: swift test --parallel

      - name: Run RobotGridWorld example
        working-directory: Examples/RobotGridWorld
        run: swift run robot-grid-world

  e2e-linux:
    name: Linux Core Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.3.2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            git \
            gnupg2 \
            libc6-dev \
            libcurl4-openssl-dev \
            libedit2 \
            libgcc-13-dev \
            libicu-dev \
            libpython3-dev \
            libsqlite3-0 \
            libstdc++-13-dev \
            libxml2-dev \
            libz3-dev \
            pkg-config \
            tzdata \
            unzip \
            zlib1g-dev
          curl -fsSL https://download.swift.org/swift-6.3.2-release/ubuntu2404/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-ubuntu24.04.tar.gz -o swift-6.3.2.tar.gz
          sudo tar -xzf swift-6.3.2.tar.gz -C /opt
          echo "/opt/swift-6.3.2-RELEASE-ubuntu24.04/usr/bin" >> "$GITHUB_PATH"

      - name: Run core-only tests
        run: |
          swift --version
          swift test --disable-default-traits --parallel

      - name: Run RobotGridWorld example
        working-directory: Examples/RobotGridWorld
        run: swift run robot-grid-world

      - name: Run TensorRT-guarded tests (best effort)
        continue-on-error: true
        env:
          CI: true
        run: |
          swift test --disable-default-traits --traits TensorRTBackend --parallel
