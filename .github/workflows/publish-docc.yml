name: Publish DocC

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Swift 6.3.2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            git \
            gnupg2 \
            libc6-dev \
            libcurl4-openssl-dev \
            libedit2 \
            libgcc-13-dev \
            libicu-dev \
            libpython3-dev \
            libsqlite3-0 \
            libstdc++-13-dev \
            libxml2-dev \
            libz3-dev \
            pkg-config \
            tzdata \
            unzip \
            zlib1g-dev
          curl -fsSL https://download.swift.org/swift-6.3.2-release/ubuntu2404/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-ubuntu24.04.tar.gz -o swift-6.3.2.tar.gz
          sudo tar -xzf swift-6.3.2.tar.gz -C /opt
          echo "/opt/swift-6.3.2-RELEASE-ubuntu24.04/usr/bin" >> "$GITHUB_PATH"

      - name: Show Swift version
        run: swift --version

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install MuJoCo SDK
        run: ./scripts/install-mujoco-sdk.sh

      - name: Build static DocC site
        env:
          DOCC_HOSTING_BASE_PATH: ${{ github.event.repository.name }}
        run: ./scripts/build-docc-site.sh --output-path .build/docc-site --hosting-base-path "$DOCC_HOSTING_BASE_PATH"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .build/docc-site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
